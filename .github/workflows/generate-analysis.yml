name: GoldBlock — Newsletter Hebdomadaire

on:
  schedule:
    - cron: '0 7 * * 1'  # Chaque lundi à 7h UTC = 8h Paris
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Générer la newsletter GoldBlock (XAUUSD + BTCUSD)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node << 'SCRIPT'
          const https = require('https');

          const SB_URL     = process.env.SUPABASE_URL;
          const SB_SERVICE = process.env.SUPABASE_SERVICE_KEY;
          const GEMINI_KEY = process.env.GEMINI_API_KEY;

          function httpRequest(options, body) {
            return new Promise((resolve, reject) => {
              const req = https.request(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch { resolve(data); }
                });
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          async function generateNewsletter(actif) {
            const now = new Date();
            const lastMonday = new Date(now); lastMonday.setDate(now.getDate() - 7);
            const lastSunday = new Date(now); lastSunday.setDate(now.getDate() - 1);
            const nextFriday = new Date(now); nextFriday.setDate(now.getDate() + 4);
            const fmt = d => d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', timeZone: 'Europe/Paris' });
            const today = now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', timeZone: 'Europe/Paris' });
            const semainePasse = fmt(lastMonday) + ' – ' + fmt(lastSunday);
            const semaineCours = fmt(now) + ' – ' + fmt(nextFriday);
            const semaineLabel = 'Semaine du ' + fmt(now);

            const prompt = `Tu es un analyste de marché expert. Nous sommes le ${today}.

Génère la NEWSLETTER HEBDOMADAIRE pour ${actif} en 2 parties :
1. BILAN SEMAINE PASSÉE (${semainePasse}) — mouvements, événements, niveaux touchés
2. PROJECTIONS SEMAINE EN COURS (${semaineCours}) — setup, calendrier économique, scénarios

Recherche sur internet : prix actuel ${actif}, événements macro passés et à venir, DXY/VIX/taux US 10Y, contexte géopolitique.

Réponds UNIQUEMENT avec ce JSON valide (sans markdown ni backticks) :
{
  "actif": "${actif}",
  "titre": "Titre accrocheur avec ${actif}",
  "sous_titre": "Prix actuel + bilan + projection en 1 ligne",
  "score": <1-5>,
  "semaine": "${semaineLabel}",
  "contenu": "<section class='nl-bilan'><h2>📅 Bilan Semaine Passée — ${semainePasse}</h2><table border='1'><tr><th>Jour</th><th>Événement</th><th>Impact ${actif}</th></tr>...DONNÉES RÉELLES...</table><p>Résumé narratif.</p></section><section class='nl-macro'><h2>🌍 Contexte Macro</h2><table border='1'><tr><th>Indicateur</th><th>Valeur</th><th>Tendance</th><th>Impact</th></tr>...DXY/VIX/TAUX RÉELS...</table></section><section class='nl-tech'><h2>📊 Analyse Technique ${actif}</h2><table border='1'><tr><th>Type</th><th>Niveau</th><th>Signification</th></tr>...NIVEAUX RÉELS...</table><p>Structure de marché, SMC, Fibonacci.</p></section><section class='nl-cal'><h2>📅 Calendrier ${semaineCours}</h2><table border='1'><tr><th>Jour</th><th>Heure Paris</th><th>Événement</th><th>Impact</th></tr>...VRAIS ÉVÉNEMENTS...</table></section><section class='nl-setup'><h2>🎯 Setup de Trade</h2><p>PE/SL/TP1/TP2/TP3 avec prix réels si score>=3, sinon AUCUNE OPPORTUNITÉ CLAIRE</p></section><section class='nl-scenarios'><h2>🔮 Scénarios</h2><p><strong>🟢 Haussier :</strong> ...</p><p><strong>🔴 Baissier :</strong> ...</p><p><strong>⚪ Neutre :</strong> ...</p></section>"
}`;

            const body = JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              tools: [{ google_search: {} }],
              generationConfig: { temperature: 0.3, maxOutputTokens: 8192 }
            });

            const path = '/v1beta/models/gemini-2.0-flash:generateContent?key=' + GEMINI_KEY;
            const options = {
              hostname: 'generativelanguage.googleapis.com',
              path,
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(body)
              }
            };

            console.log('[GoldBlock] Génération ' + actif + ' avec Gemini...');
            const data = await httpRequest(options, body);

            if (data.error) throw new Error('Gemini API: ' + data.error.message);

            const text = data.candidates?.[0]?.content?.parts
              ?.filter(p => p.text)
              ?.map(p => p.text)
              ?.join('') || '';

            if (!text) throw new Error('Pas de réponse Gemini pour ' + actif);

            const clean = text.trim().replace(/^```json\s*/i,'').replace(/```\s*$/i,'').trim();
            return JSON.parse(clean);
          }

          async function storeInSupabase(a) {
            const body = JSON.stringify({
              actif: a.actif, titre: a.titre, sous_titre: a.sous_titre,
              score: a.score, contenu: a.contenu, semaine: a.semaine,
              published_at: new Date().toISOString(), visible: true
            });
            const url = new URL(SB_URL + '/rest/v1/newsletters');
            const options = {
              hostname: url.hostname, path: url.pathname, method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'apikey': SB_SERVICE,
                'Authorization': 'Bearer ' + SB_SERVICE,
                'Prefer': 'return=minimal',
                'Content-Length': Buffer.byteLength(body)
              }
            };
            await httpRequest(options, body);
            console.log('[GoldBlock] ✅ ' + a.actif + ' stocké — score: ' + a.score + '/5 — ' + a.titre);
          }

          async function main() {
            console.log('[GoldBlock] 🚀 Newsletter hebdomadaire...');
            for (const actif of ['XAUUSD', 'BTCUSD']) {
              try {
                const nl = await generateNewsletter(actif);
                await storeInSupabase(nl);
                await new Promise(r => setTimeout(r, 5000));
              } catch(err) {
                console.error('[GoldBlock] ❌ ' + actif + ':', err.message);
                process.exit(1);
              }
            }
            console.log('[GoldBlock] ✅ 2 newsletters publiées !');
          }

          main();
          SCRIPT
